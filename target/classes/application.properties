server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/secure_cart_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jackson.serialization.write-dates-as-timestamps=false

app.jwt.secret=changeThisToAStrongBase64SecretKeyForProductionOnlyAndAtLeast32Chars
app.jwt.expiration-ms=86400000
